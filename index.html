<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d3d 100%);
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .home-button {
            position: absolute;
            top: 0;
            left: 0;
            display: inline-block;
            padding: 10px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .home-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        .about-button {
            position: absolute;
            top: 0;
            right: 0;
            display: inline-block;
            padding: 10px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .about-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1em;
            color: #999;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: #333;
            aspect-ratio: 1;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }

        .gallery-item:hover img {
            filter: brightness(0.8);
        }

        .gallery-item-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .gallery-item-overlay {
            opacity: 1;
        }

        .overlay-text {
            color: white;
            font-size: 1.2em;
            font-weight: 600;
            text-align: center;
            padding: 20px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }

        .modal-close {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 3em;
            color: white;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(102, 126, 234, 0.7);
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1.5em;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s ease;
            z-index: 1001;
        }

        .modal-nav:hover {
            background: rgba(102, 126, 234, 0.7);
        }

        .modal-prev {
            left: 20px;
        }

        .modal-next {
            right: 20px;
        }

        .modal-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 0.9em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .home-button {
                position: static;
                margin-bottom: 20px;
                display: block;
                width: fit-content;
                margin: 0 auto 10px;
            }

            .about-button {
                position: static;
                margin-bottom: 20px;
                display: block;
                width: fit-content;
                margin: 0 auto 20px;
            }

            h1 {
                font-size: 2em;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .modal-nav {
                padding: 10px 15px;
                font-size: 1.2em;
            }

            .modal-close {
                width: 50px;
                height: 50px;
                font-size: 2em;
                top: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="home.html" class="home-button">← Home</a>
            <a href="about.html" class="about-button">About Me →</a>
            <h1>Art Gallery</h1>
            <p class="subtitle">Explore our collection</p>
        </header>

        <div class="gallery" id="gallery">
            <!-- Gallery items will be populated here -->
        </div>
    </div>

    <!-- Modal for viewing full-size images -->
    <div class="modal" id="modal">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <button class="modal-nav modal-prev" onclick="previousImage()">&#10094;</button>
        <div class="modal-content">
            <img class="modal-image" id="modalImage" src="" alt="Full size image">
        </div>
        <button class="modal-nav modal-next" onclick="nextImage()">&#10095;</button>
        <div class="modal-counter">
            <span id="imageCounter">1</span> / <span id="imageTotal">1</span>
        </div>
    </div>

    <script>
        // Sample gallery images - replace with your own image URLs
        const images = [
            { url: 'KKL Document from CloudConvert.png', title: 'Image 1' },
            { url: 'New Project (1).png', title: 'Image 2' },
            { url: 'New Project from Photopea (1) (1).png', title: 'Image 3' },
            { url: 'New Project from Photopea (3) (1).png', title: 'Image 4' },
            { url: 'New Project from Photopea (4) (1).png', title: 'Image 5' },
            { url: 'New Project.png', title: 'Image 6' },
        ];

        let currentImageIndex = 0;

        // Initialize gallery
        function initGallery() {
            const gallery = document.getElementById('gallery');
            images.forEach((image, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `
                    <img src="${image.url}" alt="${image.title}" loading="lazy">
                    <div class="gallery-item-overlay">
                        <div class="overlay-text">${image.title}</div>
                    </div>
                `;
                item.onclick = () => openModal(index);
                gallery.appendChild(item);
            });

            document.getElementById('imageTotal').textContent = images.length;
        }

        // Modal functions
        function openModal(index) {
            currentImageIndex = index;
            document.getElementById('modal').classList.add('active');
            updateModalImage();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function updateModalImage() {
            const image = images[currentImageIndex];
            document.getElementById('modalImage').src = image.url;
            document.getElementById('imageCounter').textContent = currentImageIndex + 1;
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % images.length;
            updateModalImage();
        }

        function previousImage() {
            currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
            updateModalImage();
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('modal').classList.contains('active')) {
                if (e.key === 'ArrowRight') nextImage();
                if (e.key === 'ArrowLeft') previousImage();
                if (e.key === 'Escape') closeModal();
            }
        });

        // Close modal when clicking outside the image
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Initialize on page load
        initGallery();
    </script>
</body>
</html>
